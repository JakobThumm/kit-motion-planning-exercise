# Services for the KIT motion-planning exercise.
#   core   : CPU-only MoveIt 2 + RViz + mock controller (everyone).
#   curobo : GPU cuMotion planner node + move_group with the cuMotion pipeline (advanced).
#   isaac  : Isaac Sim, separate container, DDS-connected (advanced, high-fidelity execution).
#
# All services share ROS_DOMAIN_ID so DDS discovery works across containers.
# Copy .env.example to .env and adjust DISPLAY / ROS_DOMAIN_ID as needed.

x-ros-env: &ros-env
  ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-42}
  RMW_IMPLEMENTATION: rmw_fastrtps_cpp
  DISPLAY: ${DISPLAY:-:0}
  QT_X11_NO_MITSHM: 1

x-x11-mounts: &x11-mounts
  - /tmp/.X11-unix:/tmp/.X11-unix:rw
  - ${XAUTHORITY:-$HOME/.Xauthority}:/root/.Xauthority:rw

services:
  core:
    # Prebuilt image published to GHCR. Students run `docker compose pull core`.
    # Pin a semester via KIT_MP_TAG in .env (default: latest). `build` stays as a
    # local fallback and tags the result with this same name.
    image: ghcr.io/jakobthumm/kit-mp-core:${KIT_MP_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.core
    environment:
      <<: *ros-env
      # RViz uses Mesa software rendering (llvmpipe) by default so it works on any
      # machine without GPU/DRI passthrough. If you have a working GPU and want
      # hardware acceleration, set LIBGL_ALWAYS_SOFTWARE=0 in .env and add a
      # `/dev/dri` device mount (see docs/06_troubleshooting.md).
      LIBGL_ALWAYS_SOFTWARE: ${LIBGL_ALWAYS_SOFTWARE:-1}
      LIBGL_ALWAYS_INDIRECT: "0"
      GALLIUM_DRIVER: llvmpipe
    network_mode: host          # simplest reliable DDS discovery on a single host
    volumes:
      - ../ros2_ws/src:/root/ros2_ws/src_mounted:rw   # edit configs live from the host
      - ../results:/root/results:rw
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    stdin_open: true
    tty: true
    command: ros2 launch kit_mp_bringup core.launch.py

  curobo:
    # GPU image is NOT redistributable (NVIDIA/Isaac layers) — built locally,
    # FROM the (pulled or built) core image.
    image: kit-mp-gpu:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.gpu
      args:
        CORE_IMAGE: ghcr.io/jakobthumm/kit-mp-core:${KIT_MP_TAG:-latest}
    environment: *ros-env
    network_mode: host
    volumes:
      - ../ros2_ws/src:/root/ros2_ws/src_mounted:rw
      - ../results:/root/results:rw
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    stdin_open: true
    tty: true
    command: ros2 launch kit_mp_curobo cumotion_planner.launch.py

  isaac:
    image: kit-mp-isaac:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.isaac
    environment:
      <<: *ros-env
      ACCEPT_EULA: "Y"
      PRIVACY_CONSENT: "Y"
    network_mode: host
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - isaac-cache:/root/.cache/ov
      - isaac-kit-cache:/root/.nvidia-omniverse
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    stdin_open: true
    tty: true
    command: /run_isaac.sh

volumes:
  isaac-cache:
  isaac-kit-cache:
