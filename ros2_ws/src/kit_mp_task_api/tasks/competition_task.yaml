# === COMPETITION TASK (fixed) ================================================
# Every group plans THIS start -> goal in the competition scene. The winner is the
# shortest valid trajectory duration (tie-break: planning time). A joint-space goal
# is used so "goal reached" is unambiguous; the competition scene forces the arm to
# move around the pillar and box obstacles.
#
# Do NOT edit this file. The scorer loads its own authoritative copy.
name: competition_task
group: fr3_arm
scene: competition
start_joints: [0.0, -0.785, 0.0, -2.356, 0.0, 1.571, 0.785]     # "ready"
goal_joints: [-1.2, 0.4, 0.3, -1.6, 0.2, 1.9, 0.6]
joint_tolerance: 0.01
