# Absolute FR3 joint limits used by MoveIt time parameterization (retiming).
#
# IMPORTANT (competition): do NOT edit this file to win. The scorer loads its own
# locked copy (kit_mp_benchmark/config/fr3_joint_limits_locked.yaml) and ignores
# any submitted limits. Raising limits here would produce a "fast" trajectory the
# real FR3 cannot execute -> it would be rejected in validation.
#
# What you MAY tune is the per-plan SCALING (max_velocity_scaling_factor,
# max_acceleration_scaling_factor in [0..1]) via the task API or RViz. Scaling can
# only slow motion down, so it is a fair path-quality knob.
#
# Values are the Franka Research 3 limits; verify against franka_description if in
# doubt. has_jerk_limits enables jerk-aware Ruckig smoothing in the scorer.
default_velocity_scaling_factor: 1.0
default_acceleration_scaling_factor: 1.0

joint_limits:
  fr3_joint1:
    has_velocity_limits: true
    max_velocity: 2.62
    has_acceleration_limits: true
    max_acceleration: 10.0
    has_jerk_limits: true
    max_jerk: 5000.0
