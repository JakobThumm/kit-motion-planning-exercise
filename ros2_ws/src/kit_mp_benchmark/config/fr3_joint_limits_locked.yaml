# AUTHORITATIVE FR3 limits used by the scorer. Students cannot override these.
# Any joint_limits a student ships in a submission are ignored; the scorer always
# loads this file. This keeps the competition fair and the winner real-robot-feasible.
joints:
  fr3_joint1: {max_velocity: 2.62, max_acceleration: 10.0, max_jerk: 5000.0}
  fr3_joint2: {max_velocity: 2.62, max_acceleration: 10.0, max_jerk: 5000.0}
  fr3_joint3: {max_velocity: 2.62, max_acceleration: 10.0, max_jerk: 5000.0}
  fr3_joint4: {max_velocity: 2.62, max_acceleration: 10.0, max_jerk: 5000.0}
  fr3_joint5: {max_velocity: 5.26, max_acceleration: 10.0, max_jerk: 5000.0}
  fr3_joint6: {max_velocity: 4.18, max_acceleration: 10.0, max_jerk: 5000.0}
  fr3_joint7: {max_velocity: 5.26, max_acceleration: 10.0, max_jerk: 5000.0}

# Position limits (rad) for the validity check.
position_limits:
  fr3_joint1: [-2.7437, 2.7437]
  fr3_joint2: [-1.7837, 1.7837]
  fr3_joint3: [-2.9007, 2.9007]
  fr3_joint4: [-3.0421, -0.1518]
  fr3_joint5: [-2.8065, 2.8065]
  fr3_joint6: [0.5445, 4.5169]
  fr3_joint7: [-3.0159, 3.0159]

# Tolerance slack (limits are checked with this relative margin to avoid FP noise).
tolerance_ratio: 1.02
